; ---- lesson video / PDF uploads (kept in step with nginx client_max_body_size) ----
upload_max_filesize = 512M
post_max_size = 512M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; ---- opcache: compile PHP once, reuse the bytecode on every later request ----
; biggest single speed win; code is baked into the image so timestamp checks are
; pointless — validate_timestamps=0 skips a stat() call per file per request
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; don't advertise the PHP version in response headers
expose_php = Off
